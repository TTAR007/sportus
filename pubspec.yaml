name: sportus
description: Create and join sport activities.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.1

  # State & Navigation
  flutter_riverpod: ^3.1.0
  go_router: ^17.1.0

  # Models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Forms
  reactive_forms: ^18.2.2

  # UI
  google_fonts: ^8.0.2
  gap: ^3.0.1
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^3.2.5
  json_serializable: ^6.8.0
  fake_cloud_firestore: ^4.0.2+1
  mockito: ^5.4.4
  # Note: riverpod_test is incompatible with flutter_riverpod ^3.x
  # Use ProviderContainer.test() built into Riverpod 3 instead — no extra package needed

flutter:
  uses-material-design: true
